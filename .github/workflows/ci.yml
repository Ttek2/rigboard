name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Verify server starts
        run: |
          cd server
          timeout 10 node -e "
            const express = require('express');
            const Database = require('better-sqlite3');
            const fs = require('fs');
            const path = require('path');
            const db = new Database(':memory:');
            const schema = fs.readFileSync(path.join(__dirname, 'db', 'schema.sql'), 'utf8');
            db.exec(schema);
            console.log('Schema OK');
            db.close();
          " || true

      - name: Check for build artifacts
        run: |
          test -f client/dist/index.html && echo "Client build OK" || exit 1

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rigboard:test .

      - name: Test Docker container starts
        run: |
          docker run -d --name rigboard-test -p 3000:3000 rigboard:test
          sleep 5
          curl -f http://localhost:3000/api/health || exit 1
          docker stop rigboard-test
