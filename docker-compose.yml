services:
  rigboard:
    image: ghcr.io/ttek2/rigboard:latest
    build: .
    container_name: rigboard
    ports:
      - "0.0.0.0:${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    environment:
      - TZ=${TZ:-Europe/Dublin}
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - HOST=0.0.0.0
      - HOST_PROC=/host/proc
    restart: unless-stopped
    pid: host
